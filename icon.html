<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PULSE Icon Generator</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@600&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #1a1a1a;
            color: #f4efe6;
            font-family: 'Outfit', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            gap: 32px;
        }

        h1 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 42px;
            letter-spacing: 8px;
            color: #f4efe6;
        }

        p.sub {
            font-size: 12px;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: #666;
            margin-top: -20px;
        }

        .controls {
            background: #242424;
            border-radius: 20px;
            padding: 28px;
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
            max-width: 640px;
            width: 100%;
        }

        .ctrl {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        label {
            font-size: 10px;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: #666;
        }

        input[type=color] {
            width: 52px;
            height: 36px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            padding: 2px;
            background: #333;
        }

        input[type=range] {
            width: 140px;
            accent-color: #e8321f;
        }

        select {
            background: #333;
            color: #f4efe6;
            border: none;
            border-radius: 8px;
            padding: 8px 12px;
            font-family: 'Outfit', sans-serif;
            font-size: 12px;
            cursor: pointer;
        }

        .val {
            font-size: 11px;
            color: #888;
            text-align: center;
        }

        .preview-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        #preview {
            border-radius: 22.5%;
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.6);
        }

        .preview-lbl {
            font-size: 10px;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: #555;
        }

        .sizes-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            justify-content: center;
            max-width: 700px;
        }

        .size-card {
            background: #242424;
            border-radius: 14px;
            padding: 14px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: background 0.2s, transform 0.15s;
            border: 1.5px solid transparent;
        }

        .size-card:hover {
            background: #2e2e2e;
            transform: translateY(-2px);
            border-color: #444;
        }

        .size-card canvas {
            border-radius: 18%;
        }

        .size-card span {
            font-size: 10px;
            letter-spacing: 2px;
            color: #666;
        }

        .size-card .dl-btn {
            font-size: 9px;
            letter-spacing: 2px;
            text-transform: uppercase;
            background: #333;
            color: #f4efe6;
            border: none;
            border-radius: 100px;
            padding: 5px 12px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .size-card .dl-btn:hover {
            background: #e8321f;
        }

        .btn-row {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn {
            padding: 14px 32px;
            border: none;
            border-radius: 100px;
            cursor: pointer;
            font-family: 'Outfit', sans-serif;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 3px;
            text-transform: uppercase;
            transition: transform .15s, opacity .15s;
        }

        .btn:active {
            transform: scale(0.96);
            opacity: 0.85;
        }

        .btn.primary {
            background: #e8321f;
            color: #fff;
        }

        .btn.secondary {
            background: #333;
            color: #f4efe6;
        }

        .note {
            font-size: 11px;
            color: #555;
            letter-spacing: 1px;
            text-align: center;
            max-width: 480px;
            line-height: 1.8;
        }

        .note strong {
            color: #888;
        }
    </style>
</head>

<body>

    <h1>PULSE</h1>
    <p class="sub">Icon Generator</p>

    <!-- Kontroller -->
    <div class="controls">
        <div class="ctrl">
            <label>Background</label>
            <input type="color" id="bgColor" value="#f4efe6">
        </div>
        <div class="ctrl">
            <label>Ring Color</label>
            <input type="color" id="ringColor" value="#181818">
        </div>
        <div class="ctrl">
            <label>Accent</label>
            <input type="color" id="accentColor" value="#e8321f">
        </div>
        <div class="ctrl">
            <label>Style</label>
            <select id="iconStyle">
                <option value="classic">Classic (light bg)</option>
                <option value="dark">Dark Mode</option>
                <option value="minimal">Minimal</option>
                <option value="gradient">Gradient</option>
            </select>
        </div>
        <div class="ctrl">
            <label>Ring Scale <span class="val" id="scaleVal">88%</span></label>
            <input type="range" id="ringScale" min="60" max="95" value="88">
        </div>
        <div class="ctrl">
            <label>Pulse Speed</label>
            <input type="range" id="animSpeed" min="1" max="5" value="3">
        </div>
    </div>

    <!-- 512px preview (canlı animasyonlu) -->
    <div class="preview-wrap">
        <canvas id="preview" width="200" height="200"></canvas>
        <div class="preview-lbl">Live Preview (200×200)</div>
    </div>

    <!-- Tüm boyutlar -->
    <div class="sizes-grid" id="sizesGrid"></div>

    <div class="btn-row">
        <button class="btn primary" onclick="downloadAll()">⬇ Download All (ZIP)</button>
        <button class="btn secondary" onclick="renderAll()">🔄 Regenerate</button>
    </div>

    <p class="note">
        <strong>Tek tek</strong> indirmek için kart üzerindeki butona tıkla.<br>
        <strong>Hepsini ZIP</strong> olarak indirmek için yukarıdaki butonu kullan.<br>
        Dosyaları <strong>/icons/</strong> klasörüne koy.
    </p>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script>
        const SIZES = [72, 96, 128, 144, 152, 167, 180, 192, 512];
        let animFrame, pulseR = 0.15;

        // ── İkon Çizici ──────────────────────────────────────────────────
        function drawIcon(canvas, size, animated = false) {
            const ctx = canvas.getContext('2d');
            const s = size;
            canvas.width = canvas.height = s;
            const bg = document.getElementById('bgColor').value;
            const ink = document.getElementById('ringColor').value;
            const red = document.getElementById('accentColor').value;
            const style = document.getElementById('iconStyle').value;
            const scale = document.getElementById('ringScale').value / 100;
            const cx = s / 2, cy = s / 2;
            const outerR = s * 0.44 * scale;
            const innerR = s * 0.08;
            const dotR = s * 0.03;

            ctx.clearRect(0, 0, s, s);

            // ── Arka plan ──
            const radius = s * 0.22; // köşe yarıçapı (maskable için 0)
            roundRect(ctx, 0, 0, s, s, radius);

            if (style === 'gradient') {
                const grd = ctx.createRadialGradient(cx, cy * 0.8, s * 0.05, cx, cy, s * 0.65);
                grd.addColorStop(0, lighten(bg, 15));
                grd.addColorStop(1, darken(bg, 10));
                ctx.fillStyle = grd;
            } else if (style === 'dark') {
                ctx.fillStyle = '#111111';
            } else {
                ctx.fillStyle = bg;
            }
            ctx.fill();

            const fgColor = style === 'dark' ? '#f4efe6' : ink;

            // ── Dış halka (soluk) ──
            drawCircle(ctx, cx, cy, outerR, 'transparent', hexAlpha(fgColor, 0.08), s * 0.18);

            // ── Hit zone ──
            drawCircle(ctx, cx, cy, outerR, 'transparent', hexAlpha(fgColor, 0.06), s * 0.10);

            // ── Perfect zone (kırmızı) ──
            drawCircle(ctx, cx, cy, outerR, 'transparent', hexAlpha(red, 0.18), s * 0.04);

            // ── Target ring ──
            drawCircle(ctx, cx, cy, outerR, 'transparent', hexAlpha(fgColor, 0.30), s * 0.014);

            // ── İç halka ──
            drawCircle(ctx, cx, cy, innerR, 'transparent', hexAlpha(fgColor, 0.20), s * 0.01);

            // ── Pulse ring (animasyonlu veya sabit) ──
            const pr = animated ? outerR * pulseR : outerR * 0.45;
            const inZone = (animated ? pulseR : 0.45) > 0.88;
            const pulseColor = inZone ? red : fgColor;
            const pulseAlpha = inZone ? 1 : 0.75;
            drawCircle(ctx, cx, cy, pr, 'transparent', hexAlpha(pulseColor, pulseAlpha), s * 0.018);

            // ── Merkez nokta ──
            ctx.beginPath();
            ctx.arc(cx, cy, dotR, 0, Math.PI * 2);
            ctx.fillStyle = hexAlpha(fgColor, 0.85);
            ctx.fill();

            // ── PULSE yazısı (büyük ikonlarda) ──
            if (s >= 128) {
                ctx.font = `${s * 0.115}px 'Bebas Neue', sans-serif`;
                ctx.fillStyle = hexAlpha(fgColor, style === 'minimal' ? 0.0 : 0.55);
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('PULSE', cx, cy + outerR * 0.52);
            }
        }

        function roundRect(ctx, x, y, w, h, r) {
            ctx.beginPath();
            ctx.moveTo(x + r, y);
            ctx.lineTo(x + w - r, y);
            ctx.arcTo(x + w, y, x + w, y + r, r);
            ctx.lineTo(x + w, y + h - r);
            ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
            ctx.lineTo(x + r, y + h);
            ctx.arcTo(x, y + h, x, y + h - r, r);
            ctx.lineTo(x, y + r);
            ctx.arcTo(x, y, x + r, y, r);
            ctx.closePath();
        }

        function drawCircle(ctx, cx, cy, r, fill, stroke, lw) {
            if (r <= 0) return;
            ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2);
            if (fill !== 'transparent') { ctx.fillStyle = fill; ctx.fill(); }
            if (stroke) { ctx.strokeStyle = stroke; ctx.lineWidth = lw; ctx.stroke(); }
        }

        function hexAlpha(hex, a) {
            const r = parseInt(hex.slice(1, 3), 16);
            const g = parseInt(hex.slice(3, 5), 16);
            const b = parseInt(hex.slice(5, 7), 16);
            return `rgba(${r},${g},${b},${a})`;
        }

        function lighten(hex, amt) {
            return adjustColor(hex, amt);
        }
        function darken(hex, amt) {
            return adjustColor(hex, -amt);
        }
        function adjustColor(hex, amt) {
            const r = Math.min(255, Math.max(0, parseInt(hex.slice(1, 3), 16) + amt));
            const g = Math.min(255, Math.max(0, parseInt(hex.slice(3, 5), 16) + amt));
            const b = Math.min(255, Math.max(0, parseInt(hex.slice(5, 7), 16) + amt));
            return '#' + [r, g, b].map(v => v.toString(16).padStart(2, '0')).join('');
        }

        // ── Canlı Preview Animasyonu ─────────────────────
        function animPreview() {
            const spd = document.getElementById('animSpeed').value * 0.003;
            pulseR += spd;
            if (pulseR > 1.1) pulseR = 0.15;
            drawIcon(document.getElementById('preview'), 200, true);
            animFrame = requestAnimationFrame(animPreview);
        }

        // ── Boyut Kartlarını Oluştur ──────────────────────
        function renderAll() {
            const grid = document.getElementById('sizesGrid');
            grid.innerHTML = '';
            SIZES.forEach(size => {
                const card = document.createElement('div');
                card.className = 'size-card';

                const cvs = document.createElement('canvas');
                const displaySize = Math.min(size, 80);
                cvs.style.width = cvs.style.height = displaySize + 'px';
                drawIcon(cvs, size);

                const lbl = document.createElement('span');
                lbl.textContent = `${size}×${size}`;

                const btn = document.createElement('button');
                btn.className = 'dl-btn';
                btn.textContent = '↓ Download';
                btn.onclick = (e) => { e.stopPropagation(); downloadOne(cvs, size); };

                card.appendChild(cvs);
                card.appendChild(lbl);
                card.appendChild(btn);
                grid.appendChild(card);
            });
        }

        // ── Tek İkon İndir ────────────────────────────────
        function downloadOne(canvas, size) {
            const a = document.createElement('a');
            a.download = `icon-${size}.png`;
            a.href = canvas.toDataURL('image/png');
            a.click();
        }

        // ── Hepsini ZIP olarak İndir ─────────────────────
        async function downloadAll() {
            const zip = new JSZip();
            const folder = zip.folder('icons');

            const cards = document.querySelectorAll('.size-card canvas');
            cards.forEach((cvs, i) => {
                const size = SIZES[i];
                const dataUrl = cvs.toDataURL('image/png');
                const base64 = dataUrl.split(',')[1];
                folder.file(`icon-${size}.png`, base64, { base64: true });
            });

            // README ekle
            folder.file('README.txt',
                'PULSE Icons\n===========\nGenerated by PULSE Icon Generator\n\n' +
                'Place these files in your /icons/ folder.\n\n' +
                'Files:\n' + SIZES.map(s => `  icon-${s}.png  (${s}x${s})`).join('\n')
            );

            const blob = await zip.generateAsync({ type: 'blob' });
            const a = document.createElement('a');
            a.download = 'pulse-icons.zip';
            a.href = URL.createObjectURL(blob);
            a.click();
        }

        // ── Event Listeners ───────────────────────────────
        ['bgColor', 'ringColor', 'accentColor', 'iconStyle', 'ringScale'].forEach(id => {
            document.getElementById(id).addEventListener('input', () => {
                if (id === 'ringScale') {
                    document.getElementById('scaleVal').textContent =
                        document.getElementById('ringScale').value + '%';
                }
                renderAll();
            });
        });

        // ── Başlat ────────────────────────────────────────
        // Font yüklenmesini bekle
        document.fonts.ready.then(() => {
            renderAll();
            animPreview();
        });
    </script>
</body>

</html>
